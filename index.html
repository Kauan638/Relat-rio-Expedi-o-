<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Confirmação de Carregamento</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">

        <h1>📦 Confirmação de Carregamento</h1>
        <p class="subtitulo">Foto + dados da doca → direto pro WhatsApp</p>

        <!-- ===================================== -->
        <!-- FOTO -->
        <!-- ===================================== -->

        <div class="card">

            <h2>1. Foto</h2>

            <div id="fotoVazia" class="foto-area">
                <div class="foto-icone">📷</div>
                <p class="foto-texto">Tire uma foto da tela de paletes carregados ou escolha da galeria</p>

                <div class="foto-botoes">
                    <label class="btn-foto btn-tirar" for="inputCamera">
                        📷 Tirar Foto
                    </label>
                    <input type="file" id="inputCamera" accept="image/*" capture="environment" class="file-hidden">

                    <label class="btn-foto btn-galeria" for="inputGaleria">
                        🖼️ Escolher da Galeria
                    </label>
                    <input type="file" id="inputGaleria" accept="image/*" class="file-hidden">
                </div>
            </div>

            <div id="fotoPreviewBox" class="foto-preview-box" style="display:none;">
                <img id="fotoPreview" class="foto-preview" alt="Foto do carregamento">
                <button type="button" class="btn-retirar" onclick="retirarFoto()">🔄 Trocar Foto</button>
            </div>

        </div>

        <!-- ===================================== -->
        <!-- DADOS -->
        <!-- ===================================== -->

        <div class="card">

            <h2>2. Dados do Carregamento</h2>

            <div class="form-grid">

                <div class="campo">
                    <label for="campoDoca">🚪 Doca</label>
                    <input type="text" id="campoDoca" inputmode="numeric" placeholder="Ex: 46">
                </div>

                <div class="campo">
                    <label for="campoLoja">🏪 Loja</label>
                    <input type="text" id="campoLoja" inputmode="numeric" placeholder="Ex: 90">
                </div>

                <div class="campo">
                    <label for="campoPaletes">📦 Qtd. Paletes</label>
                    <input type="number" id="campoPaletes" min="0" placeholder="Ex: 6">
                </div>

                <div class="campo">
                    <label for="campoCliente">🚛 Cliente / Rede</label>
                    <input type="text" id="campoCliente" placeholder="Ex: Zaffari">
                </div>

                <div class="campo campo-full">
                    <label for="campoStatus">✅ Status</label>
                    <select id="campoStatus">
                        <option value="Faturada">Faturada</option>
                        <option value="Não Faturada">Não Faturada</option>
                        <option value="Em Conferência">Em Conferência</option>
                        <option value="Pendente">Pendente</option>
                    </select>
                </div>

                <div class="campo campo-full">
                    <label for="campoObs">📝 Observação (opcional)</label>
                    <input type="text" id="campoObs" placeholder="Ex: divergência de 1 palete">
                </div>

            </div>

            <button type="button" class="btn-revisar" onclick="abrirConfirmacao()">
                👁️ Revisar e Enviar
            </button>

        </div>

        <!-- ===================================== -->
        <!-- HISTÓRICO DO DIA -->
        <!-- ===================================== -->

        <div class="card">

            <div class="historico-cabecalho">
                <h2>Registros de Hoje</h2>
                <button type="button" class="btn-limpar-historico" onclick="limparHistorico()">🧹 Limpar</button>
            </div>

            <div id="historicoVazio" class="historico-vazio">
                Nenhum registro enviado ainda hoje.
            </div>

            <div id="historicoLista" class="historico-lista"></div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- MODAL — CONFIRMAÇÃO -->
    <!-- ===================================== -->

    <div id="modalConfirmar" class="modal-overlay" style="display:none;">

        <div class="modal-caixa">

            <h3>Confirmar Envio</h3>
            <p>Confira os dados antes de enviar pro WhatsApp.</p>

            <img id="modalFotoPreview" class="modal-foto" alt="Foto do carregamento">

            <pre id="modalTextoPreview" class="modal-texto"></pre>

            <div class="modal-acoes-coluna">

                <button type="button" class="btn-compartilhar" onclick="compartilharWhatsApp()">
                    📲 Compartilhar no WhatsApp
                </button>

                <button type="button" class="btn-so-texto" onclick="compartilharSoTexto()">
                    💬 Enviar só o texto
                </button>

                <button type="button" class="btn-modal-cancelar" onclick="fecharConfirmacao()">
                    ✏️ Voltar e Editar
                </button>

            </div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- TOAST -->
    <!-- ===================================== -->

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>

</body>
</html>
